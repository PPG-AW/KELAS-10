<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0,
    viewport-fit=cover">
  <meta name="theme-color" content="#1565C0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .welcome-card {
      background: linear-gradient(135deg,
        var(--primary), #1976D2);
      color: white;
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }
    .welcome-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 2px;
    }
    .welcome-sub {
      font-size: 12px;
      opacity: 0.8;
    }
    .level-chip {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-sub">Bilangan Berpangkat</div>
    <div class="header-title" id="headerNama">-</div>
  </div>
  <button class="btn-header" onclick="APP.logout()">
    Keluar
  </button>
</div>

<!-- KONTEN -->
<div class="container" id="konten">
  <div class="loading" style="margin-top:40px">
    <div class="spinner"></div>
    <div class="loading-text">Memuat dashboard...</div>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>
<script>

const nama = APP.getSiswa();

window.onload = async function() {
  if (!APP.requireLogin()) return;
  document.getElementById('headerNama').textContent = nama;
  await load();
};

async function load() {
  const res = await API.getDashboard(nama);

  if (res.status !== 'success') {
    document.getElementById('konten').innerHTML = `
      <div style="margin-top:20px">
        <div class="alert alert-error">
          <div class="alert-icon">!</div>
          <div>${res.message}</div>
        </div>
        <button class="btn btn-primary" onclick="load()">
          Coba Lagi
        </button>
      </div>`;
    return;
  }

  const { siswa, pengaturan, progress,
          jadwalAktif, langkahSelanjutnya } = res.data;

  APP.setPertemuan(pengaturan.pertemuanAktif);
  if (jadwalAktif) APP.setLevel(jadwalAktif.level);

  render(siswa, pengaturan, progress,
         jadwalAktif, langkahSelanjutnya);
}

function render(siswa, peng, prog, jadwal, langkah) {
  const p = parseInt(peng.pertemuanAktif) || 0;

  document.getElementById('konten').innerHTML = `

    <!-- WELCOME -->
    <div class="welcome-card" style="margin-top:12px">
      <div class="welcome-sub">
        Matematika X SMK</div>
      <div class="welcome-name">${siswa.nama}</div>
      ${jadwal ? `
        <div class="level-chip">
          Level ${jadwal.level} &mdash;
          ${CONFIG.LEVEL[jadwal.level]?.nama || ''}
        </div>` : ''}
    </div>

    <!-- LANGKAH SELANJUTNYA -->
    ${renderCTA(langkah, p)}

    <!-- PERTEMUAN -->
    <div class="card">
      <div class="card-title">Status Pertemuan</div>
      ${[1,2,3].map(n => renderPertemuan(
        n, peng, prog, siswa, p)).join('')}
    </div>

    <!-- JADWAL AKTIF -->
    ${jadwal && p > 0
      ? renderJadwal(jadwal, prog, p) : ''}

    <!-- HASIL -->
    <div class="card">
      <div class="card-title">Rekap Hasil</div>
      <div class="stats-row">
        ${[1,2,3].map(n => `
          <div class="stat-box">
            <div class="stat-value" style="color:${
              warnaSkor(siswa[`skorPostTestP${n}`])
            }">
              ${siswa[`skorPostTestP${n}`] || '-'}
            </div>
            <div class="stat-label">Post-test P${n}</div>
          </div>`).join('')}
      </div>
      <div class="text-xs text-hint text-center mt-8">
        KKTP ${peng.kktp} &mdash; tuntas jika skor
        lebih dari atau sama dengan ${peng.kktp}
      </div>
    </div>

    <!-- REFRESH -->
    <button class="btn btn-secondary" onclick="load()">
      Perbarui Data
    </button>

    <div class="bottom-space"></div>
  `;
}

function renderCTA(langkah, p) {
  if (!langkah) return '';

  const colors = {
    tunggu  : '#EF6C00',
    selesai : '#2E7D32',
    default : '#1565C0'
  };
  const c = colors[langkah.aksi] || colors.default;

  return `
    <div class="cta-box"
      style="border-color:${c};background:${c}0D">
      <div class="cta-box-label"
        style="color:${c}">
        Langkah Selanjutnya
      </div>
      <div class="cta-box-text"
        style="color:${c}">
        ${langkah.pesan}
      </div>
      ${langkah.url && langkah.aksi !== 'tunggu'
        && langkah.aksi !== 'selesai' ? `
        <button class="btn btn-sm"
          style="background:${c};color:white;
            width:auto"
          onclick="APP.goTo('${langkah.url}')">
          Mulai Sekarang
        </button>` : ''}
    </div>`;
}

function renderPertemuan(no, peng, prog, siswa, aktif) {
  const p = prog[`P${no}`];
  const isAktif = parseInt(aktif) === no;
  const isSelesai = p && p.selesai === 'Ya';
  const status = peng[`statusP${no}`] || 'Tutup';
  const iconType = APP.getPertemuanIcon(
    status, isAktif, isSelesai);

  const colors = {
    done  : 'var(--success)',
    active: 'var(--primary)',
    open  : 'var(--warning)',
    locked: 'var(--text-hint)'
  };
  const c = colors[iconType];

  return `
    <div class="pertemuan-item
      ${isSelesai ? 'selesai' : isAktif ? 'aktif' : ''}">
      <div class="pertemuan-icon ${iconType}">
        ${no}
      </div>
      <div class="pertemuan-info">
        <div class="pertemuan-title">
          Pertemuan ${no}
        </div>
        <div class="pertemuan-desc">
          ${CONFIG.PERTEMUAN[no]}
        </div>
        ${p ? `
          <div class="text-xs text-hint mt-4">
            Post-test:
            ${siswa[`skorPostTestP${no}`] || 'Belum'}
          </div>` : ''}
      </div>
      <div>
        ${isSelesai
          ? '<span class="badge badge-success">Selesai</span>'
          : isAktif
            ? '<span class="badge badge-fill-primary">Aktif</span>'
            : status === 'Buka'
              ? '<span class="badge badge-warning">Tersedia</span>'
              : '<span class="badge badge-gray">Terkunci</span>'}
      </div>
    </div>`;
}

function renderJadwal(jadwal, prog, p) {
  const pp = prog[`P${p}`];
  const sesi = [
    { no:1, nama:jadwal.sesi1,
      status:pp?.statusSesi1||'Belum' },
    { no:2, nama:jadwal.sesi2,
      status:pp?.statusSesi2||'Belum' },
    { no:3, nama:jadwal.sesi3,
      status:pp?.statusSesi3||'Belum' }
  ];

  const aktif = sesi.find(s => s.status !== 'Selesai');

  return `
    <div class="card">
      <div class="card-title">
        Jadwal Rotasi &mdash; Pertemuan ${p}
      </div>
      <div class="text-xs text-hint mb-12">
        ${CONFIG.PERTEMUAN[p]}
      </div>
      ${sesi.map(s => `
        <div class="sesi-item
          ${s.status==='Selesai' ? 'selesai' :
            aktif?.no===s.no ? 'aktif' : ''}">
          <div class="sesi-header">
            <span class="sesi-label">Sesi ${s.no}</span>
            ${APP.getStatusBadge(s.status)}
          </div>
          <div class="sesi-name">${s.nama}</div>
          ${aktif?.no === s.no
            && s.status !== 'Selesai' ? `
            <div class="mt-8">
              ${getActionBtn(s)}
            </div>` : ''}
        </div>`).join('')}
    </div>`;
}

function getActionBtn(s) {
  if (s.nama.includes('Guru')) {
    return `<div class="text-xs text-hint">
      Datang ke meja guru untuk bimbingan</div>`;
  }
  const url = s.nama.includes('LKPD')
    ? `lkpd.html?sesi=${s.no}`
    : `materi.html?sesi=${s.no}`;
  return `<button class="btn btn-primary btn-sm"
    onclick="APP.goTo('${url}')">
    Mulai Sesi ${s.no}
  </button>`;
}

function warnaSkor(skor) {
  if (!skor || skor === '-') return 'var(--text-hint)';
  return parseInt(skor) >= CONFIG.KKTP
    ? 'var(--success)' : 'var(--error)';
}

</script>
</body>
</html>
