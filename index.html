<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" 
    content="width=device-width, initial-scale=1.0, 
    viewport-fit=cover">
  <meta name="theme-color" content="#1565C0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" 
    content="black-translucent">
  <title>Bilangan Berpangkat</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      background: var(--primary);
    }
    .page {
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
    }
    .hero {
      padding: calc(48px + env(safe-area-inset-top))
        24px 40px;
    }
    .login-sheet {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 24px 16px;
      padding-bottom: calc(24px + 
        env(safe-area-inset-bottom));
      min-height: calc(100vh - 200px);
    }
    .app-icon {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.2);
      border-radius: 16px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="app-icon">
      <svg viewBox="0 0 24 24">
        <path d="M19 3H5c-1.1 0-2 .9-2 
          2v14c0 1.1.9 2 2 2h14c1.1 0 
          2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 
          14l-5-5 1.41-1.41L12 
          14.17l7.59-7.59L21 8l-9 9z"/>
      </svg>
    </div>
    <div class="hero-title">Bilangan Berpangkat</div>
    <div class="hero-sub">Matematika &middot; Kelas X SMK</div>
    <div class="hero-badge">Individual Rotation Model</div>
  </div>

  <!-- LOGIN SHEET -->
  <div class="login-sheet">

    <!-- CARI NAMA -->
    <div class="mb-16">
      <div style="font-size:18px;font-weight:800;
        color:var(--text);margin-bottom:4px">
        Selamat Datang
      </div>
      <div class="text-sm text-hint mb-16">
        Cari namamu untuk masuk ke kelas
      </div>

      <!-- SEARCH INPUT -->
      <div class="search-box form-group">
        <label class="form-label">Cari Nama</label>
        <input
          type="text"
          id="inputCari"
          class="form-control"
          placeholder="Ketik minimal 2 huruf..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          spellcheck="false"
          oninput="handleCari(this.value)"
        >
        <div class="search-results" id="hasilCari"></div>
      </div>

      <!-- NAMA TERPILIH -->
      <div id="namaTerpilih" class="hidden">
        <div class="selected-name">
          <svg width="18" height="18" 
            viewBox="0 0 24 24" 
            fill="var(--success)">
            <path d="M12 12c2.21 0 4-1.79 
              4-4s-1.79-4-4-4-4 1.79-4 
              4 1.79 4 4 4zm0 2c-2.67 
              0-8 1.34-8 4v2h16v-2c0-2.66
              -5.33-4-8-4z"/>
          </svg>
          <span class="selected-name-text" 
            id="textNamaTerpilih"></span>
          <button class="selected-name-close" 
            onclick="batalPilih()">
            &times;
          </button>
        </div>
        <button class="btn btn-primary" 
          onclick="masuk()">
          Masuk Sekarang
        </button>
      </div>
    </div>

    <!-- STATUS -->
    <div id="statusLogin"></div>

    <!-- DIVIDER -->
    <div class="divider">Belum terdaftar?</div>

    <!-- DAFTAR -->
    <div class="form-group">
      <label class="form-label">Daftar dengan Nama Baru</label>
      <input
        type="text"
        id="inputDaftar"
        class="form-control"
        placeholder="Masukkan nama lengkap..."
        autocorrect="off"
        autocapitalize="words"
        maxlength="50"
      >
    </div>
    <button class="btn btn-secondary" onclick="daftar()">
      Daftar Sekarang
    </button>

    <!-- INFO -->
    <div style="margin-top:24px;padding:14px;
      background:var(--bg);border-radius:var(--radius-sm);
      display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div>
        <div class="text-xs text-hint">Mata Pelajaran</div>
        <div class="text-sm text-bold">Matematika</div>
      </div>
      <div>
        <div class="text-xs text-hint">Kelas</div>
        <div class="text-sm text-bold">X SMK</div>
      </div>
      <div>
        <div class="text-xs text-hint">Materi</div>
        <div class="text-sm text-bold">Bil. Berpangkat</div>
      </div>
      <div>
        <div class="text-xs text-hint">KKTP</div>
        <div class="text-sm text-bold">78</div>
      </div>
    </div>

    <div class="bottom-space"></div>
  </div>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>
<script>

window.onload = function() {
  if (APP.getSiswa()) APP.goTo('dashboard.html');
};

let namaTerpilih = '';
let debounce;

async function handleCari(val) {
  clearTimeout(debounce);
  batalPilih();

  const el = document.getElementById('hasilCari');

  if (val.length < 2) {
    el.classList.remove('show');
    el.innerHTML = '';
    return;
  }

  el.innerHTML = `
    <div class="search-hint">Mencari...</div>`;
  el.classList.add('show');

  debounce = setTimeout(async () => {
    const res = await API.cariSiswa(val);

    if (res.status === 'success' && res.data.length > 0) {
      el.innerHTML = res.data.map(s => `
        <div class="search-item" 
          onclick="pilihSiswa('${s.nama}')">
          ${s.nama}
        </div>`).join('');
    } else {
      el.innerHTML = `
        <div class="search-hint">
          Nama tidak ditemukan. Silakan daftar.
        </div>`;
    }
  }, 400);
}

function pilihSiswa(nama) {
  namaTerpilih = nama;
  document.getElementById('inputCari').value = nama;
  document.getElementById('hasilCari')
    .classList.remove('show');
  document.getElementById('textNamaTerpilih')
    .textContent = nama;
  document.getElementById('namaTerpilih')
    .classList.remove('hidden');
  document.getElementById('statusLogin').innerHTML = '';
}

function batalPilih() {
  namaTerpilih = '';
  document.getElementById('namaTerpilih')
    .classList.add('hidden');
}

function masuk() {
  if (!namaTerpilih) {
    APP.showToast('Pilih nama terlebih dahulu', 'error');
    return;
  }
  APP.setSiswa(namaTerpilih);
  APP.goTo('dashboard.html');
}

async function daftar() {
  const nama = document.getElementById('inputDaftar')
    .value.trim();

  if (nama.length < 3) {
    APP.showError('statusLogin',
      'Nama minimal 3 karakter');
    return;
  }

  APP.showLoading('statusLogin', 'Mendaftar...');

  const res = await API.daftarSiswa(nama);

  if (res.status === 'success' || res.status === 'exists') {
    APP.showSuccess('statusLogin', res.message);
    setTimeout(() => {
      APP.setSiswa(nama);
      APP.goTo('dashboard.html');
    }, 800);
  } else {
    APP.showError('statusLogin', res.message);
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('#inputCari') &&
      !e.target.closest('#hasilCari')) {
    document.getElementById('hasilCari')
      .classList.remove('show');
  }
});

</script>
</body>
</html>
