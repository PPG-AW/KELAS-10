<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0,
    viewport-fit=cover">
  <meta name="theme-color" content="#1565C0">
  <title>Refleksi</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-sub">Refleksi Belajar</div>
    <div class="header-title" id="headerP">-</div>
  </div>
  <button class="btn-back"
    onclick="APP.goTo('dashboard.html')">
    Dashboard
  </button>
</div>

<div class="container">

  <div class="alert alert-info" style="margin-top:12px">
    <div class="alert-icon">i</div>
    <div>
      Isi refleksi dengan jujur.
      Jawaban kamu membantu guru
      memahami pengalaman belajarmu.
    </div>
  </div>

  <div class="card" id="kartuForm">
    <div class="card-title">Form Refleksi</div>

    <!-- P1 -->
    <div class="form-group">
      <label class="form-label">
        1. Apa yang sudah kamu pahami
        dari pembelajaran hari ini?
      </label>
      <textarea id="r1" class="form-control"
        placeholder="Tulis pemahamanmu..."
        rows="3"></textarea>
    </div>

    <!-- P2 -->
    <div class="form-group">
      <label class="form-label">
        2. Bagian mana yang masih sulit
        atau membingungkan?
      </label>
      <textarea id="r2" class="form-control"
        placeholder="Tulis kesulitanmu..."
        rows="3"></textarea>
    </div>

    <!-- P3 -->
    <div class="form-group">
      <label class="form-label">
        3. Apa yang paling membantu
        proses belajarmu hari ini?
      </label>
      <div id="opsi3"></div>
    </div>

    <!-- P4 -->
    <div class="form-group">
      <label class="form-label">
        4. Bagaimana perasaanmu setelah
        belajar hari ini?
      </label>
      <div id="opsi4"></div>
    </div>

    <!-- P5 -->
    <div class="form-group">
      <label class="form-label">
        5. Apa yang ingin kamu pelajari
        lebih lanjut?
      </label>
      <textarea id="r5" class="form-control"
        placeholder="Tulis keinginanmu..."
        rows="2"></textarea>
    </div>

    <div id="statusRefleksi"></div>

    <button class="btn btn-primary"
      id="btnSubmit" onclick="submit()">
      Kirim Refleksi
    </button>

  </div>

  <div class="bottom-space"></div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>
<script>

if (!APP.requireLogin()) {};
const nama = APP.getSiswa();
const pertemuan = APP.getPertemuan() || 1;

let val3 = '', val4 = '';

const OPSI_3 = [
  'Penjelasan guru di stasiun guru',
  'Materi dan kuis di website',
  'LKPD mandiri',
  'Lainnya'
];

const OPSI_4 = [
  'Senang dan paham',
  'Cukup paham',
  'Masih bingung',
  'Belum paham sama sekali'
];

window.onload = function() {
  document.getElementById('headerP').textContent =
    'Pertemuan ' + pertemuan;
  
  // Render opsi pertanyaan 3
  document.getElementById('opsi3').innerHTML =
    OPSI_3.map(function(o) {
      return '<div class="refleksi-option" ' +
        'onclick="pilih3(this, \'' + o + '\')">' +
        '<span class="refleksi-dot"></span>' +
        '<span>' + o + '</span>' +
        '</div>';
    }).join('');
  
  // Render opsi pertanyaan 4
  document.getElementById('opsi4').innerHTML =
    OPSI_4.map(function(o) {
      return '<div class="refleksi-option" ' +
        'onclick="pilih4(this, \'' + o + '\')">' +
        '<span class="refleksi-dot"></span>' +
        '<span>' + o + '</span>' +
        '</div>';
    }).join('');
};

function pilih3(el, val) {
  document.querySelectorAll('#opsi3 .refleksi-option')
    .forEach(function(e) {
      e.classList.remove('selected');
    });
  el.classList.add('selected');
  val3 = val;
}

function pilih4(el, val) {
  document.querySelectorAll('#opsi4 .refleksi-option')
    .forEach(function(e) {
      e.classList.remove('selected');
    });
  el.classList.add('selected');
  val4 = val;
}

async function submit() {
  const r1 = document.getElementById('r1').value;
  const r4 = val4;

  if (!r1 && !r4) {
    APP.showToast(
      'Isi minimal pertanyaan 1 dan 4', 'error');
    return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'Menyimpan...';
  APP.showLoading('statusRefleksi', 'Menyimpan...');

  const res = await API.simpanRefleksi(nama, pertemuan, {
    yangDipahami: r1,
    yangMasihSulit: document.getElementById('r2').value,
    yangMembantu: val3,
    perasaan: val4,
    inginDipelajari: document.getElementById('r5').value
  });

  if (res.status === 'success') {
    document.getElementById('kartuForm').innerHTML =
      '<div style="text-align:center;padding:24px 0">' +
        '<div style="width:56px;height:56px;' +
          'background:var(--success-light);' +
          'border-radius:50%;' +
          'margin:0 auto 16px;' +
          'display:flex;align-items:center;' +
          'justify-content:center">' +
          '<svg width="28" height="28" ' +
            'viewBox="0 0 24 24" ' +
            'fill="var(--success)">' +
            '<path d="M9 16.17L4.83 12l-1.42 ' +
              '1.41L9 19 21 7l-1.41-1.41z"/>' +
          '</svg>' +
        '</div>' +
        '<div style="font-size:18px;font-weight:800;' +
          'color:var(--success);margin-bottom:4px">' +
          'Pertemuan ' + pertemuan + ' Selesai' +
        '</div>' +
        '<div class="text-sm text-hint mb-16">' +
          'Terima kasih sudah belajar ' +
          'dengan sungguh-sungguh.' +
        '</div>' +
        '<button class="btn btn-primary" ' +
          'onclick="APP.goTo(\'dashboard.html\')">' +
          'Kembali ke Dashboard' +
        '</button>' +
      '</div>';
  } else {
    APP.showError('statusRefleksi', res.message);
    btn.disabled = false;
    btn.textContent = 'Kirim Refleksi';
  }
}

</script>
</body>
</html>
