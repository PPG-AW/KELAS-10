<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0,
    viewport-fit=cover">
  <meta name="theme-color" content="#1565C0">
  <title>LKPD - Bilangan Berpangkat</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .lkpd-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 57px;
      z-index: 50;
    }
    .lkpd-badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .kegiatan-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .kegiatan-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--primary-light);
    }
    .isian-group {
      margin-bottom: 14px;
    }
    .isian-label {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .isian-input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: var(--font);
      background: var(--white);
      -webkit-appearance: none;
    }
    .isian-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .isian-inline {
      display: inline-block;
      width: 80px;
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: var(--radius-xs);
      font-size: 15px;
      text-align: center;
      font-family: var(--font);
      -webkit-appearance: none;
    }
    .isian-inline:focus {
      outline: none;
      border-color: var(--primary);
    }
    .tabel-isian {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
      margin: 10px 0;
    }
    .tabel-isian th {
      background: var(--primary-light);
      color: var(--primary);
      padding: 8px;
      text-align: center;
      font-size: 12px;
    }
    .tabel-isian td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      text-align: center;
    }
    .tabel-isian input {
      width: 100%;
      border: none;
      text-align: center;
      font-size: 14px;
      padding: 4px;
      font-family: var(--font);
      background: transparent;
    }
    .tabel-isian input:focus {
      outline: none;
      background: var(--primary-light);
    }
    .btn-submit-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: var(--white);
      border-top: 1px solid var(--border);
      z-index: 100;
      max-width: 480px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-sub">LKPD Mandiri</div>
    <div class="header-title" id="headerP">-</div>
  </div>
  <button class="btn-back"
    onclick="konfirmasiKeluar()">
    Kembali
  </button>
</div>

<!-- INFO BAR -->
<div class="lkpd-header" id="lkpdInfo">
  <div class="lkpd-badge-row">
    <span class="badge badge-fill-primary" id="badgeP">-</span>
    <span class="badge" id="badgeLevel">-</span>
  </div>
</div>

<!-- KONTEN -->
<div class="container" id="konten" style="padding-bottom:80px">
  <div class="loading" style="margin-top:40px">
    <div class="spinner"></div>
    <div class="loading-text">Memuat LKPD...</div>
  </div>
</div>

<!-- TOMBOL SUBMIT -->
<div class="btn-submit-wrap" id="btnSubmitWrap" style="display:none">
  <button class="btn btn-primary" id="btnSubmit" onclick="submitLKPD()">
    Kumpulkan LKPD
  </button>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>

// ============================================
// GENERATE SOAL PG
// ============================================

function generateSoalPGHTML(prefix, soalArr) {
  return soalArr.map((s, i) => `
    <div style="padding:12px;background:var(--bg);
      border-radius:var(--radius-sm);margin-bottom:8px">
      <div class="text-sm mb-8">${i+1}. ${s.soal}</div>
      <div>
        ${s.opsi.map((o, j) => {
          const h = ['A','B','C','D'][j];
          return `
            <label style="display:flex;gap:8px;
              align-items:center;padding:6px 0;
              font-size:14px;cursor:pointer">
              <input type="radio" name="${prefix}_${i}" value="${h}">
              <span>${h}. ${o}</span>
            </label>`;
        }).join('')}
      </div>
    </div>`).join('');
}

// INIT
// ============================================

window.onload = function() {
  document.getElementById('headerP').textContent =
    `Pertemuan ${pertemuan}`;

  const key = `${pertemuan}_${level}`;
  const lkpd = LKPD[key];

  const lv = CONFIG.LEVEL[level];
  document.getElementById('badgeP').textContent = `P${pertemuan}`;
  document.getElementById('badgeLevel').textContent =
    `Level ${level} - ${lv?.nama || ''}`;
  document.getElementById('badgeLevel').style.background =
    `${lv?.warna}15`;
  document.getElementById('badgeLevel').style.color = lv?.warna;

  if (!lkpd) {
    document.getElementById('konten').innerHTML = `
      <div class="alert alert-error" style="margin-top:12px">
        <div class="alert-icon">!</div>
        <div>LKPD tidak ditemukan untuk Level ${level} Pertemuan ${pertemuan}</div>
      </div>`;
    return;
  }

  document.getElementById('konten').innerHTML = `
    <div class="alert alert-info" style="margin-top:12px">
      <div class="alert-icon">i</div>
      <div>
        <strong>${lkpd.judul}</strong><br>
        <span class="text-xs">
          Kerjakan secara mandiri. Isi semua kolom jawaban.
        </span>
      </div>
    </div>
    ${lkpd.kegiatan.map(k => `
      <div class="kegiatan-card">
        <div class="kegiatan-title">${k.nama}</div>
        ${k.html}
      </div>`).join('')}
    <div style="height:60px"></div>`;

  document.getElementById('btnSubmitWrap').style.display = 'block';
};

// ============================================
// SUBMIT LKPD
// ============================================

async function submitLKPD() {
  // Kumpulkan semua jawaban
  const inputs = document.querySelectorAll(
    '#konten input, #konten textarea, #konten select');
  const jawaban = {};
  inputs.forEach(inp => {
    if (inp.name) {
      if (inp.type === 'radio') {
        if (inp.checked) jawaban[inp.name] = inp.value;
      } else {
        jawaban[inp.name] = inp.value;
      }
    }
  });

  // Cek minimal ada jawaban
  const terisi = Object.values(jawaban).filter(v => v).length;
  if (terisi === 0) {
    APP.showToast('Isi minimal 1 jawaban terlebih dahulu', 'error');
    return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'Menyimpan...';

  const res = await API.simpanLKPD(
    nama, pertemuan, level, jawaban);

  if (res.status === 'success') {
    APP.showToast('LKPD berhasil disimpan');
    setTimeout(() => APP.goTo('dashboard.html'), 1000);
  } else {
    APP.showToast(res.message || 'Gagal menyimpan', 'error');
    btn.disabled = false;
    btn.textContent = 'Kumpulkan LKPD';
  }
}

function konfirmasiKeluar() {
  const inputs = document.querySelectorAll(
    '#konten input, #konten textarea');
  let adaIsi = false;
  inputs.forEach(i => { if (i.value) adaIsi = true; });

  if (adaIsi) {
    if (!confirm('Jawaban belum disimpan. Yakin keluar?')) return;
  }
  APP.goTo('dashboard.html');
}
