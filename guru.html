<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" 
    content="width=device-width, initial-scale=1.0">
  <title>Dashboard Guru – Bilangan Berpangkat</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="header">
  <div>
    <div class="subtitle">Dashboard Guru</div>
    <h1>Bilangan Berpangkat</h1>
  </div>
  <button class="btn-logout" 
    onclick="window.location.reload()">
    🔄 Refresh
  </button>
</div>

<div class="container-wide" style="padding:16px">

  <!-- KONTROL PERTEMUAN -->
  <div class="card">
    <div class="card-title">
      🎛️ Kontrol Pertemuan
    </div>
    
    <div style="display:grid;
      grid-template-columns:repeat(3,1fr);gap:12px">
      
      ${[1,2,3].map(p => `
        <div style="border:2px solid #e0e0e0;
          border-radius:8px;padding:12px;
          text-align:center" id="cardP${p}">
          <div style="font-weight:700;
            margin-bottom:4px">
            Pertemuan ${p}
          </div>
          <div style="font-size:11px;color:#666;
            margin-bottom:10px">
            ${CONFIG.PERTEMUAN[p]}
          </div>
          <div id="statusP${p}" 
            style="margin-bottom:8px">
            <span class="badge badge-gray">
              Memuat...
            </span>
          </div>
          <div style="display:flex;gap:6px;
            justify-content:center">
            <button class="btn btn-success btn-sm" 
              onclick="bukaP(${p})">
              Buka
            </button>
            <button class="btn btn-error btn-sm" 
              onclick="tutupP(${p})">
              Tutup
            </button>
          </div>
        </div>
      `).join('')}
      
    </div>
  </div>
  
  <!-- FILTER PERTEMUAN -->
  <div class="card">
    <div class="card-title">📊 Data Siswa</div>
    <div style="display:flex;gap:8px;
      margin-bottom:16px;flex-wrap:wrap">
      <label style="font-size:14px;
        align-self:center">Pertemuan:</label>
      <select id="filterP" class="form-control" 
        style="width:auto"
        onchange="loadData()">
        <option value="1">Pertemuan 1</option>
        <option value="2">Pertemuan 2</option>
        <option value="3">Pertemuan 3</option>
      </select>
      <button class="btn btn-primary btn-sm" 
        onclick="loadData()">
        🔄 Muat Data
      </button>
    </div>
    
    <!-- REKAP -->
    <div id="rekapData">
      <div class="loading-box">
        <div class="spinner"></div>
        <p>Memuat...</p>
      </div>
    </div>
  </div>
  
  <!-- TABEL SISWA -->
  <div class="card">
    <div class="card-title">
      👥 Detail Progress Siswa
    </div>
    <div id="tabelSiswa">
      <p style="color:#999;text-align:center">
        Pilih pertemuan dan klik "Muat Data"
      </p>
    </div>
  </div>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>
<script>

window.onload = async function() {
  await loadStatusPertemuan();
  await loadData();
};

async function loadStatusPertemuan() {
  const result = await API.getStatusPertemuan();
  if (result.status !== 'success') return;
  
  const { p1, p2, p3 } = result.data;
  
  updateStatusBadge(1, p1);
  updateStatusBadge(2, p2);
  updateStatusBadge(3, p3);
}

function updateStatusBadge(no, status) {
  const el = document.getElementById(`statusP${no}`);
  const card = document.getElementById(`cardP${no}`);
  
  if (status === 'Buka') {
    el.innerHTML = `
      <span class="badge badge-success">🟢 Terbuka</span>
    `;
    card.style.borderColor = '#2E7D32';
  } else {
    el.innerHTML = `
      <span class="badge badge-gray">🔒 Tertutup</span>
    `;
    card.style.borderColor = '#e0e0e0';
  }
}

async function bukaP(p) {
  if (!confirm(`Buka Pertemuan ${p}?`)) return;
  
  const result = await API.bukaPertemuan(p);
  if (result.status === 'success') {
    APP.showToast(`Pertemuan ${p} dibuka! ✅`);
    await loadStatusPertemuan();
  } else {
    APP.showToast(result.message, 'error');
  }
}

async function tutupP(p) {
  if (!confirm(`Tutup Pertemuan ${p}?`)) return;
  
  const result = await API.tutupPertemuan(p);
  if (result.status === 'success') {
    APP.showToast(`Pertemuan ${p} ditutup! 🔒`);
    await loadStatusPertemuan();
  } else {
    APP.showToast(result.message, 'error');
  }
}

async function loadData() {
  const p = document.getElementById('filterP').value;
  
  APP.showLoading('rekapData', 'Memuat data...');
  document.getElementById('tabelSiswa')
    .innerHTML = '<div class="loading-box"><div class="spinner"></div></div>';
  
  const result = await API.getDashboardGuru(p);
  
  if (result.status !== 'success') {
    APP.showError('rekapData', result.message);
    return;
  }
  
  const { rekap, siswa } = result.data;
  
  // Render rekap
  document.getElementById('rekapData').innerHTML = `
    <div class="stats-grid" 
      style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-box">
        <div class="stat-number">${rekap.totalSiswa}</div>
        <div class="stat-label">Total Siswa</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" style="color:#ef5350">
          ${rekap.level1}
        </div>
        <div class="stat-label">Level 1</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" style="color:#ff9800">
          ${rekap.level2}
        </div>
        <div class="stat-label">Level 2</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" style="color:#4caf50">
          ${rekap.level3}
        </div>
        <div class="stat-label">Level 3</div>
      </div>
    </div>
    
    <div style="display:flex;gap:12px;
      flex-wrap:wrap;margin-top:8px">
      <div class="alert alert-success" 
        style="flex:1;margin:0">
        ✅ Tuntas: <strong>${rekap.tuntas} siswa</strong>
      </div>
      <div class="alert alert-error" 
        style="flex:1;margin:0">
        ❌ Belum: 
        <strong>${rekap.belumTuntas} siswa</strong>
      </div>
      <div class="alert alert-info" 
        style="flex:1;margin:0">
        📊 Rata-rata: 
        <strong>${rekap.rataRata}</strong>
      </div>
    </div>
  `;
  
  // Render tabel
  document.getElementById('tabelSiswa').innerHTML = `
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Nama Siswa</th>
            <th>Level</th>
            <th>Asesmen</th>
            <th>Sesi 1</th>
            <th>Sesi 2</th>
            <th>Sesi 3</th>
            <th>Post-test</th>
            <th>Tuntas</th>
            <th>Selesai</th>
          </tr>
        </thead>
        <tbody>
          ${siswa.map((s, i) => `
            <tr>
              <td>${i + 1}</td>
              <td><strong>${s.nama}</strong></td>
              <td>
                ${s.level !== '-' ? `
                  <span class="badge" style="background:${
                    CONFIG.LEVEL[s.level]?.warna || '#999'
                  }">
                    L${s.level}
                  </span>
                ` : '-'}
              </td>
              <td>${APP.getStatusBadge(
                s.progress?.asesmen || 'Belum')}</td>
              <td>${APP.getStatusBadge(
                s.progress?.sesi1 || 'Belum')}</td>
              <td>${APP.getStatusBadge(
                s.progress?.sesi2 || 'Belum')}</td>
              <td>${APP.getStatusBadge(
                s.progress?.sesi3 || 'Belum')}</td>
              <td>
                ${s.skorPostTest !== '-' 
                  ? APP.getTuntasBadge(s.skorPostTest)
                  : '<span style="color:#999">-</span>'}
              </td>
              <td>
                ${s.tuntas === 'Ya' 
                  ? '<span class="badge badge-success">Ya</span>'
                  : '<span class="badge badge-gray">-</span>'}
              </td>
              <td>
                ${s.progress?.selesai === 'Ya'
                  ? '✅'
                  : '🔄'}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    
    <div style="font-size:12px;color:#999;
      margin-top:8px;text-align:right">
      Total: ${siswa.length} siswa | 
      KKTP: ${rekap.kktp}
    </div>
  `;
}

</script>
</body>
</html>
