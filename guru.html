<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0,
    viewport-fit=cover">
  <meta name="theme-color" content="#1565C0">
  <title>Dashboard Guru</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .filter-bar {
      position: sticky;
      top: 57px;
      background: var(--bg);
      z-index: 50;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      margin: 0 -16px;
      padding: 10px 16px;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .filter-row select {
      flex: 1;
    }
    .rekap-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .rekap-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
    }
    .rekap-value {
      font-size: 22px;
      font-weight: 800;
    }
    .rekap-label {
      font-size: 11px;
      color: var(--text-hint);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 2px;
    }
    /* Mobile table: card style */
    .siswa-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 8px;
    }
    .siswa-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .siswa-name {
      font-size: 15px;
      font-weight: 700;
    }
    .siswa-progress {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 6px;
      margin-top: 8px;
    }
    .prog-item {
      text-align: center;
    }
    .prog-item-label {
      font-size: 10px;
      color: var(--text-hint);
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-sub">Dashboard Guru</div>
    <div class="header-title">Bilangan Berpangkat</div>
  </div>
  <button class="btn-header"
    onclick="window.location.reload()">
    Perbarui
  </button>
</div>

<div class="container-wide">

  <!-- KONTROL PERTEMUAN -->
  <div class="card" style="margin-top:12px">
    <div class="card-title">Kontrol Pertemuan</div>
    <div class="guru-control" id="kontrolPertemuan">
      ${[1,2,3].map(p => `
        <div class="guru-p-card" id="cardP${p}">
          <div class="guru-p-title">P${p}</div>
          <div class="guru-p-desc">
            ${CONFIG.PERTEMUAN[p].split(' ').slice(0,3)
              .join(' ')}...
          </div>
          <div id="statP${p}" style="margin-bottom:6px">
            <span class="badge badge-gray"
              style="font-size:10px">
              Memuat
            </span>
          </div>
          <div class="guru-p-actions">
            <button class="btn btn-success btn-sm"
              onclick="bukaP(${p})">
              Buka
            </button>
            <button class="btn btn-error btn-sm"
              onclick="tutupP(${p})">
              Tutup
            </button>
          </div>
        </div>`).join('')}
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <div class="filter-row">
      <select id="filterP" class="form-control"
        onchange="loadData()">
        <option value="1">Pertemuan 1</option>
        <option value="2">Pertemuan 2</option>
        <option value="3">Pertemuan 3</option>
      </select>
      <button class="btn btn-primary btn-sm"
        onclick="loadData()">
        Muat
      </button>
    </div>
  </div>

  <!-- REKAP -->
  <div id="rekap" style="margin-top:12px">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Memuat data...</div>
    </div>
  </div>

  <!-- DAFTAR SISWA (Card Style) -->
  <div class="card">
    <div class="card-title" id="judulSiswa">
      Data Siswa
    </div>
    <div id="listSiswa">
      <div class="text-sm text-hint text-center">
        Pilih pertemuan dan klik Muat
      </div>
    </div>
  </div>

  <div class="bottom-space"></div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>
<script>

window.onload = async function() {
  await loadStatus();
  await loadData();
};

async function loadStatus() {
  const res = await API.getStatusPertemuan();
  if (res.status !== 'success') return;

  const { p1, p2, p3 } = res.data;
  setStatus(1, p1);
  setStatus(2, p2);
  setStatus(3, p3);
}

function setStatus(no, status) {
  const el = document.getElementById(`statP${no}`);
  const card = document.getElementById(`cardP${no}`);

  if (status === 'Buka') {
    el.innerHTML = `
      <span class="badge badge-success"
        style="font-size:10px">Terbuka</span>`;
    card.classList.add('open');
  } else {
    el.innerHTML = `
      <span class="badge badge-gray"
        style="font-size:10px">Tertutup</span>`;
    card.classList.remove('open');
  }
}

async function bukaP(p) {
  if (!confirm(`Buka Pertemuan ${p}?`)) return;
  const res = await API.bukaPertemuan(p);
  if (res.status === 'success') {
    APP.showToast(`Pertemuan ${p} dibuka`);
    await loadStatus();
  } else {
    APP.showToast(res.message, 'error');
  }
}

async function tutupP(p) {
  if (!confirm(`Tutup Pertemuan ${p}?`)) return;
  const res = await API.tutupPertemuan(p);
  if (res.status === 'success') {
    APP.showToast(`Pertemuan ${p} ditutup`);
    await loadStatus();
  } else {
    APP.showToast(res.message, 'error');
  }
}

async function loadData() {
  const p = document.getElementById('filterP').value;

  document.getElementById('rekap').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Memuat...</div>
    </div>`;

  document.getElementById('listSiswa').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
    </div>`;

  const res = await API.getDashboardGuru(p);
  if (res.status !== 'success') {
    APP.showError('rekap', res.message);
    return;
  }

  const { rekap, siswa } = res.data;

  // REKAP
  document.getElementById('rekap').innerHTML = `
    <div class="rekap-grid">
      <div class="rekap-box">
        <div class="rekap-value">${rekap.totalSiswa}</div>
        <div class="rekap-label">Total Siswa</div>
      </div>
      <div class="rekap-box">
        <div class="rekap-value"
          style="color:var(--success)">
          ${rekap.tuntas}
        </div>
        <div class="rekap-label">Tuntas</div>
      </div>
      <div class="rekap-box">
        <div class="rekap-value"
          style="color:var(--error)">
          ${rekap.belumTuntas}
        </div>
        <div class="rekap-label">Belum Tuntas</div>
      </div>
      <div class="rekap-box">
        <div class="rekap-value"
          style="color:var(--primary)">
          ${rekap.rataRata}
        </div>
        <div class="rekap-label">Rata-rata</div>
      </div>
    </div>

    <!-- DISTRIBUSI LEVEL -->
    <div class="card" style="margin-bottom:12px">
      <div class="text-xs text-hint mb-8">
        DISTRIBUSI LEVEL
      </div>
      <div style="display:flex;gap:8px">
        ${[1,2,3].map(l => {
          const val = rekap[`level${l}`] || 0;
          const pct = rekap.totalSiswa > 0
            ? Math.round((val/rekap.totalSiswa)*100) : 0;
          const w = CONFIG.LEVEL[l]?.warna;
          return `
            <div style="flex:1;text-align:center">
              <div style="height:6px;background:#eee;
                border-radius:4px;overflow:hidden;
                margin-bottom:4px">
                <div style="height:100%;width:${pct}%;
                  background:${w};border-radius:4px">
                </div>
              </div>
              <div class="text-xs text-bold"
                style="color:${w}">${val}</div>
              <div class="text-xs text-hint">
                Level ${l}
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;

  // JUDUL
  document.getElementById('judulSiswa').textContent =
    `Data Siswa (${siswa.length})`;

  // LIST SISWA (Card Style untuk Mobile)
  document.getElementById('listSiswa').innerHTML =
    siswa.length === 0
      ? `<div class="text-sm text-hint text-center">
           Belum ada data siswa</div>`
      : siswa.map((s, i) => `
          <div class="siswa-card">
            <div class="siswa-card-header">
              <div>
                <div class="siswa-name">${s.nama}</div>
                <div class="text-xs text-hint mt-4">
                  ${s.level !== '-'
                    ? APP.getLevelBadge(s.level)
                    : '<span class="badge badge-gray">Belum asesmen</span>'}
                </div>
              </div>
              <div style="text-align:right">
                ${APP.getTuntasBadge(s.skorPostTest)}
                <div class="text-xs text-hint mt-4">
                  ${s.progress?.selesai === 'Ya'
                    ? 'Selesai' : 'Belum selesai'}
                </div>
              </div>
            </div>

            <div style="border-top:1px solid var(--border);
              padding-top:8px">
              <div class="text-xs text-hint mb-6">
                PROGRESS SESI
              </div>
              <div class="siswa-progress">
                <div class="prog-item">
                  <div class="prog-item-label">Asesmen</div>
                  ${APP.getStatusBadge(
                    s.progress?.asesmen || 'Belum')}
                </div>
                <div class="prog-item">
                  <div class="prog-item-label">Post-test</div>
                  ${APP.getStatusBadge(
                    s.progress?.posttest || 'Belum')}
                </div>
                <div class="prog-item">
                  <div class="prog-item-label">Refleksi</div>
                  ${APP.getStatusBadge(
                    s.progress?.refleksi || 'Belum')}
                </div>
              </div>

              <div class="siswa-progress" style="margin-top:6px">
                <div class="prog-item">
                  <div class="prog-item-label">Sesi 1</div>
                  ${APP.getStatusBadge(
                    s.progress?.sesi1 || 'Belum')}
                </div>
                <div class="prog-item">
                  <div class="prog-item-label">Sesi 2</div>
                  ${APP.getStatusBadge(
                    s.progress?.sesi2 || 'Belum')}
                </div>
                <div class="prog-item">
                  <div class="prog-item-label">Sesi 3</div>
                  ${APP.getStatusBadge(
                    s.progress?.sesi3 || 'Belum')}
                </div>
              </div>

              ${s.jadwal ? `
                <div style="margin-top:8px;padding:8px;
                  background:var(--bg);border-radius:
                  var(--radius-xs)">
                  <div class="text-xs text-hint mb-4">
                    JADWAL ROTASI
                  </div>
                  ${[1,2,3].map(n => `
                    <div style="font-size:11px;
                      padding:2px 0">
                      Sesi ${n}: ${s.jadwal[`sesi${n}`]||'-'}
                    </div>`).join('')}
                </div>` : ''}
            </div>
          </div>`).join('');
}

</script>
</body>
</html>
